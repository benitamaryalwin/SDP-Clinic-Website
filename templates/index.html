<!DOCTYPE html>
<html>
<head>
<title>Clinic Management System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
}

/* HEADER */
.header {
    background: #2f4050;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

/* NAVBAR */
.navbar {
    background: #3e556b;
    text-align: center;
    padding: 10px;
}

.navbar button {
    background: #1abc9c;
    border: none;
    padding: 10px 18px;
    margin: 5px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    transition: 0.2s;
}

.navbar button:hover {
    background: #16a085;
}

/* STATUS TEXT */
.status {
    margin: 20px;
    color: #555;
}

/* CARD */
.card {
    width: 420px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

/* FORM */
.card h3 {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
}

input:focus {
    outline: none;
    border-color: #3498db;
}

/* BUTTON */
.submit-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #3498db;
    border: none;
    color: white;
    font-size: 15px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.submit-btn:hover {
    background: #2980b9;
}

/* OUTPUT BOX */
.output {
    margin-top: 15px;
    padding: 12px;
    background: #f4f6f8;
    border-left: 5px solid #1abc9c;
    border-radius: 6px;
    font-size: 14px;
    white-space: pre-line;
}
</style>

</head>

<body>

<div class="header">Clinic Management System</div>

<div class="navbar">
    <button>Login</button>
    <button>Register</button>
    <button>Patients</button>
    <button>Logout</button>
</div>

<p class="status">Not Logged In</p>

<div class="card">

    <h3>Register Patient</h3>

    <form method="POST" action="/submit">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="number" name="age" placeholder="Age" required>
        <input type="text" name="gender" placeholder="Gender" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="text" name="problem" placeholder="Describe Problem" required>

        <button class="submit-btn" type="submit">Register Patient</button>
    </form>

    {% if output %}
    <div class="output">
        <strong>✔ Status</strong><br><br>
        {{ output }}
    </div>
    {% endif %}

</div>

</body>
</html>
