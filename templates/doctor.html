<!DOCTYPE html>

<html>
<head>
<title>Doctor Module</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 25px;
    width: 350px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 10px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">
    <h2>Doctor Entry</h2>

```
<form method="POST" action="/doctor_submit">
    <input type="number" name="id" placeholder="Patient ID" required>
    <input type="text" name="name" placeholder="Patient Name" required>
    <input type="text" name="diagnosis" placeholder="Diagnosis" required>
    <input type="text" name="prescription" placeholder="Prescription" required>

    <button type="submit">Submit</button>
</form>
```

</div>

</body>
</html>
